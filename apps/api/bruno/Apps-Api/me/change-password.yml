info:
  name: Change Password
  type: http
  seq: 1
http:
  method: POST
  url: "{{host}}/v1/me/change-password"
  headers:
    - name: "content-type"
      value: application/json
  body:
    type: json
    data: |-
        {
          "currentPassword": "OldPassword1",
          "newPassword": "NewPass123"
        }
  auth: inherit
settings:
  encodeUrl: true
  timeout: 0
  followRedirects: true
  maxRedirects: 5
