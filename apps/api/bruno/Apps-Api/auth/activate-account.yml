info:
  name: Activate Account
  type: http
  seq: 1
http:
  method: POST
  url: "{{host}}/v1/auth/activate"
  headers:
    - name: "content-type"
      value: application/json
  body:
    type: json
    data: |-
        {
          "token": "some-activation-token"
        }
  auth: inherit
settings:
  encodeUrl: true
  timeout: 0
  followRedirects: true
  maxRedirects: 5
