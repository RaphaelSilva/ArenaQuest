info:
  name: Forgot Password Request
  type: http
  seq: 2
http:
  method: POST
  url: "{{host}}/v1/auth/forgot-password"
  headers:
    - name: "content-type"
      value: application/json
  body:
    type: json
    data: |-
        {
          "email": "student@arenaquest.app"
        }
  auth: inherit
settings:
  encodeUrl: true
  timeout: 0
  followRedirects: true
  maxRedirects: 5
