info:
  name: Google OAuth Callback Handler
  type: http
  seq: 4
http:
  method: GET
  url: "{{host}}/v1/auth/google/callback"
  params:
    - name: state
      value: string
      type: query
    - name: code
      value: string
      type: query
  auth: inherit
settings:
  encodeUrl: true
  timeout: 0
  followRedirects: true
  maxRedirects: 5
