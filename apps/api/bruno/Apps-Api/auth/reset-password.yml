info:
  name: Reset Password
  type: http
  seq: 9
http:
  method: POST
  url: "{{host}}/v1/auth/reset-password"
  headers:
    - name: "content-type"
      value: application/json
  body:
    type: json
    data: |-
        {
          "newPassword": "newpassword123",
          "token": "some-reset-token"
        }
  auth: inherit
settings:
  encodeUrl: true
  timeout: 0
  followRedirects: true
  maxRedirects: 5
