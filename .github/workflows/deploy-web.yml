name: Deploy Web

on:
  push:
    branches:
      - main
      - develop
    paths:
      - 'apps/web/**'
      - 'packages/shared/**'
      - '.github/workflows/deploy-web.yml'
  workflow_dispatch:

# Prevent multiple deployments of the same branch from running simultaneously
concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  # ────────────────────────────────────────────────────────────────────────────
  # 1. Verify — Lint, build shared dependency, then run tests
  # ────────────────────────────────────────────────────────────────────────────
  verify:
    name: Verify (Lint, Build & Test)
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Install pnpm
        uses: pnpm/action-setup@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'pnpm'

      - name: Install Dependencies
        run: pnpm install --frozen-lockfile

      - name: Lint
        run: make lint-web

      - name: Build shared
        run: pnpm turbo build --filter @arenaquest/shared

      - name: Run Tests
        run: make test-web

  # ────────────────────────────────────────────────────────────────────────────
  # 2. Deploy Staging — builds and deploys with staging API URL
  # ────────────────────────────────────────────────────────────────────────────
  deploy-staging:
    name: Deploy to Staging
    needs: verify
    runs-on: ubuntu-latest
    environment:
      name: staging
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Install pnpm
        uses: pnpm/action-setup@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'pnpm'

      - name: Install Dependencies
        run: pnpm install --frozen-lockfile

      - name: Build shared
        run: pnpm turbo build --filter @arenaquest/shared

      - name: Build for Cloudflare Pages (Staging)
        run: pnpm --filter web pages:build
        env:
          NEXT_PUBLIC_API_URL: https://api-staging.raphael-1d2.workers.dev
          # White-label branding — sourced from the staging GitHub Environment
          # vars; unset → empty → ArenaQuest defaults in brand.ts/next.config.ts.
          NEXT_PUBLIC_BRAND_SIGLA: ${{ vars.NEXT_PUBLIC_BRAND_SIGLA }}
          NEXT_PUBLIC_BRAND_NAME_PREFIX: ${{ vars.NEXT_PUBLIC_BRAND_NAME_PREFIX }}
          NEXT_PUBLIC_BRAND_NAME_ACCENT: ${{ vars.NEXT_PUBLIC_BRAND_NAME_ACCENT }}
          NEXT_PUBLIC_BRAND_POWERED_BY: ${{ vars.NEXT_PUBLIC_BRAND_POWERED_BY }}
          NEXT_PUBLIC_BRAND_ACCENT: ${{ vars.NEXT_PUBLIC_BRAND_ACCENT }}

      - name: Deploy to Cloudflare Pages (Staging)
        uses: cloudflare/wrangler-action@v3
        with:
          apiToken: ${{ secrets.CF_API_TOKEN }}
          accountId: ${{ secrets.CF_ACCOUNT_ID }}
          workingDirectory: apps/web
          command: pages deploy .vercel/output/static --project-name=arenaquest-web-staging

  # ────────────────────────────────────────────────────────────────────────────
  # 3. Deploy Production — builds and deploys with production API URL
  # ────────────────────────────────────────────────────────────────────────────
  deploy-production:
    name: Deploy to Production
    needs: deploy-staging
    if: github.ref_name == 'main'
    runs-on: ubuntu-latest
    environment:
      name: production
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Install pnpm
        uses: pnpm/action-setup@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'pnpm'

      - name: Install Dependencies
        run: pnpm install --frozen-lockfile

      - name: Build shared
        run: pnpm turbo build --filter @arenaquest/shared

      - name: Build for Cloudflare Pages (Production)
        run: pnpm --filter web pages:build
        env:
          NEXT_PUBLIC_API_URL: https://api.raphael-1d2.workers.dev
          # White-label branding — sourced from the production GitHub Environment
          # vars; unset → empty → ArenaQuest defaults in brand.ts/next.config.ts.
          NEXT_PUBLIC_BRAND_SIGLA: ${{ vars.NEXT_PUBLIC_BRAND_SIGLA }}
          NEXT_PUBLIC_BRAND_NAME_PREFIX: ${{ vars.NEXT_PUBLIC_BRAND_NAME_PREFIX }}
          NEXT_PUBLIC_BRAND_NAME_ACCENT: ${{ vars.NEXT_PUBLIC_BRAND_NAME_ACCENT }}
          NEXT_PUBLIC_BRAND_POWERED_BY: ${{ vars.NEXT_PUBLIC_BRAND_POWERED_BY }}
          NEXT_PUBLIC_BRAND_ACCENT: ${{ vars.NEXT_PUBLIC_BRAND_ACCENT }}

      - name: Deploy to Cloudflare Pages (Production)
        uses: cloudflare/wrangler-action@v3
        with:
          apiToken: ${{ secrets.CF_API_TOKEN }}
          accountId: ${{ secrets.CF_ACCOUNT_ID }}
          workingDirectory: apps/web
          command: pages deploy .vercel/output/static --project-name=arenaquest-web
